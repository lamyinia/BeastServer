syntax = "proto3";

package beast.moba.common;

// MOBA 共享类型(可被 pixel_moba 等玩法 proto import)

message Vec2 {
  float x = 1;
  float y = 2;
}

message Vec2i {
  sint32 x = 1;
  sint32 y = 2;
}

// 矩形(用于 AOE 范围/碰撞检测)
message Rect {
  float x = 1;
  float y = 2;
  float w = 3;
  float h = 4;
}

// ====== 位掩码与枚举常量(proto3 无 enum 跨文件 import 友好性差,用注释文档) ======

// buff_flags 位定义:
//   bit 0  = stun(眩晕)
//   bit 1  = slow(减速)
//   bit 2  = silence(沉默)
//   bit 3  = root(禁锢)
//   bit 4  = disarm(禁攻)
//   bit 5  = airborne(击飞)
//   bit 6  = suppressed(压制)
//   bit 7  = blind(致盲)
//   bit 8  = charm(魅惑)
//   bit 9  = fear(恐惧)
//   bit 10 = taunt(嘲讽)
//   bit 11-15 = reserved

// state_flags 位定义:
//   bit 0 = alive
//   bit 1 = attacking
//   bit 2 = casting
//   bit 3 = moving
//   bit 4 = channeling(引导)
//   bit 5 = invisible(隐身)
//   bit 6 = invulnerable(无敌)
//   bit 7 = detected(被视野发现)
//   bit 8 = dead
//   bit 9 = stunned(由 buff 派生,但快照冗余)
//   bit 10-15 = reserved

// anim_type 枚举值:
//   0  = idle
//   1  = move
//   2  = attack
//   3  = cast_q
//   4  = cast_w
//   5  = cast_e
//   6  = cast_r
//   7  = hit(受击)
//   8  = die
//   9  = respawn
//   10 = channel(引导)
//   11 = taunt(嘲讽动作)
//   12 = victory(胜利)

// team 枚举值:
//   0 = neutral
//   1 = blue
//   2 = red

// damage_type 枚举值:
//   0 = physical
//   1 = magical
//   2 = true(真实伤害)

// gold_reason 枚举值:
//   0 = kill
//   1 = minion
//   2 = tower
//   3 = passive(自然增长)
//   4 = buy(消费)
//   5 = sell(出售)
