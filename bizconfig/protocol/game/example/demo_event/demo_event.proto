syntax = "proto3";

package beast.demo;

// route:PingRequest1|c2s|demo.event.ping1|ping1
message PingRequest1 {
  string text = 1;
}

// PingPush1: ping1 为 req-only，无 s2c push（见 demo_event_engine.cpp）
message PingPush1 {
  string text = 1;
}

