syntax = "proto3";

package beast.net;

// route:AuthRequest|c2s|auth.login.request
message AuthRequest {
  string token = 1;
  string device_id = 2;
  string version = 3;
}

// route:AuthResponse|s2c_resp|auth.login.response
message AuthResponse {
  bool success = 1;
  string message = 2;
  uint64 pid = 3;
  string nickname = 4;
}
