syntax = "proto3";

package beast.biz.moba.pixel_moba.hero_level_bonus;
option go_package = "beast.biz.moba.pixel_moba.hero_level_bonus";

message HeroLevelBonusRowServer {
    uint32 id = 1;
    uint32 hero_id = 2;
    int32 level = 3;
    int32 skill_point = 4;
    int32 exp_to_next = 5;
    string unlock_slot = 6;
    int32 max_hp = 7;
    int32 max_mana = 8;
    float hp_regen = 9;
    float mana_regen = 10;
    int32 physical_attack = 11;
    int32 magic_attack = 12;
    int32 physical_defense = 13;
    int32 magic_defense = 14;
    float attack_before = 15;
    float attack_after = 16;
    float attack_interval = 17;
    float attack_range = 18;
    float move_speed = 19;
    float collision_radius = 20;
    float vision_range = 21;
    float physical_lifesteal = 22;
    float magic_lifesteal = 23;
    float crit_rate = 24;
    float crit_damage = 25;
    int32 physical_pen = 26;
    float physical_pen_pct = 27;
    int32 magic_pen = 28;
    float magic_pen_pct = 29;
    float cd_reduction = 30;
    float dodge = 31;
    float hit_rate = 32;
    float slow_resist = 33;
    float tenacity = 34;
}

message HeroLevelBonusServerConfig {
    repeated HeroLevelBonusRowServer rows = 1;
}

message HeroLevelBonusRowClient {
    uint32 id = 1;
    uint32 hero_id = 2;
    int32 level = 3;
    int32 skill_point = 4;
    int32 exp_to_next = 5;
    string unlock_slot = 6;
    int32 max_hp = 7;
    int32 max_mana = 8;
    float hp_regen = 9;
    float mana_regen = 10;
    int32 physical_attack = 11;
    int32 magic_attack = 12;
    int32 physical_defense = 13;
    int32 magic_defense = 14;
    float attack_before = 15;
    float attack_after = 16;
    float attack_interval = 17;
    float attack_range = 18;
    float move_speed = 19;
    float collision_radius = 20;
    float vision_range = 21;
    float physical_lifesteal = 22;
    float magic_lifesteal = 23;
    float crit_rate = 24;
    float crit_damage = 25;
    int32 physical_pen = 26;
    float physical_pen_pct = 27;
    int32 magic_pen = 28;
    float magic_pen_pct = 29;
    float cd_reduction = 30;
    float dodge = 31;
    float hit_rate = 32;
    float slow_resist = 33;
    float tenacity = 34;
}

message HeroLevelBonusClientConfig {
    repeated HeroLevelBonusRowClient rows = 1;
}
