syntax = "proto3";

package beast.biz.moba.pixel_moba.skill_level;
option go_package = "beast.biz.moba.pixel_moba.skill_level";

message SkillLevelRowServer {
    uint32 skill_id = 1;
    int32 level = 2;
    int32 cooldown_ms = 3;
    int32 mana_cost = 4;
    float cast_range = 5;
    float radius = 6;
    int32 damage_base = 7;
    int32 heal_base = 8;
    int32 buff_duration_ms = 9;
    float projectile_speed = 10;
    float physical_scaling = 11;
    float magic_scaling = 12;
    float max_hp_scaling = 13;
    float lifesteal_pct = 14;
}

message SkillLevelServerConfig {
    repeated SkillLevelRowServer rows = 1;
}

message SkillLevelRowClient {
    uint32 skill_id = 1;
    int32 level = 2;
    int32 cooldown_ms = 3;
    int32 mana_cost = 4;
    float cast_range = 5;
}

message SkillLevelClientConfig {
    repeated SkillLevelRowClient rows = 1;
}
